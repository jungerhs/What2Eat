  /* ── Base ── */

  /* ── Toast animation ── */
  @keyframes slide-in { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

<!-- ====== SCRIPTS ====== -->
<script>
// ═══════════════ State ═══════════════
const API = 'http://localhost:8000';
const state = {
  messages: [],
  isStreaming: false,
  connectionStatus: 'connecting',
  rebuildConfirm: false,
};

// ═══════════════ Utilities ═══════════════
function $(id) { return document.getElementById(id); }
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function now() { return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ═══════════════ Toast ═══════════════
function showToast(msg, type = 'info') {
  const colors = { info: 'bg-warm-800/80 text-white', error: 'bg-red-500 text-white', success: 'bg-emerald-500 text-white' };
  const el = document.createElement('div');
  el.className = `toast-enter pointer-events-auto px-4 py-2 rounded-xl text-sm font-medium ${colors[type] || colors.info}`;
  el.textContent = msg;
  $('toast-container').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; }, 4000);
  setTimeout(() => el.remove(), 4400);
}

// ═══════════════ Auto-resize textarea ═══════════════
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 128) + 'px';
}

// ═══════════════ Sidebar toggle (mobile) ═══════════════
function toggleSidebar() {
  $('stats-sidebar').classList.toggle('open');
}

// ═══════════════ Connection check ═══════════════
async function checkHealth() {
  try {
    const res = await fetch(`${API}/api/health`);
    if (res.ok) {
      const data = await res.json();
      state.connectionStatus = data.status; // 'ok' | 'initializing' | 'error'
    } else {
      state.connectionStatus = 'error';
    }
  } catch {
    state.connectionStatus = 'error';
  }
  updateConnectionDot();
  if (state.connectionStatus === 'ok') fetchStats();
}

function updateConnectionDot() {
  const dot = $('conn-dot');
  const status = $('stat-status');
  const chatDot = $('chat-status-dot');
  const chatText = $('chat-status-text');
  const colors = { ok: 'bg-emerald-400', initializing: 'bg-yellow-400', error: 'bg-red-400', connecting: 'bg-yellow-400' };
  const labels = { ok: '运行中', initializing: '初始化中', error: '异常', connecting: '检测中' };
  const textColors = { ok: 'text-emerald-500', initializing: 'text-yellow-500', error: 'text-red-500', connecting: 'text-yellow-500' };
  
  // Update nav dot
  dot.className = `w-2 h-2 rounded-full ${colors[state.connectionStatus] || 'bg-gray-400'}`;
  // Update sidebar status
  status.textContent = labels[state.connectionStatus] || '未知';
  status.className = 'font-medium ' + (textColors[state.connectionStatus] || 'text-gray-500');
  
  // Update chat header status
  if (chatDot && chatText) {
    chatDot.className = `w-1.5 h-1.5 rounded-full ${colors[state.connectionStatus] || 'bg-gray-400'}`;
    chatText.textContent = labels[state.connectionStatus] || '未知';
  }
}

// ═══════════════ Stats ═══════════════
async function fetchStats() {
  try {
    const res = await fetch(`${API}/api/stats`);
    if (!res.ok) return;
    const data = await res.json();
    $('stat-queries').textContent = data.routing.total_queries;
    $('stat-recipes').textContent = data.knowledge_base.total_recipes;
    $('stat-ingredients').textContent = data.knowledge_base.total_ingredients;
    $('stat-steps').textContent = data.knowledge_base.total_cooking_steps;
    $('stat-chunks').textContent = data.knowledge_base.total_chunks;
    $('stat-vectors').textContent = data.knowledge_base.vector_count;

    // Routing bars
    const total = data.routing.total_queries;
    if (total > 0) {
      const tPct = Math.round(data.routing.traditional_count / total * 100);
      const gPct = Math.round(data.routing.graph_rag_count / total * 100);
      const cPct = Math.round(data.routing.combined_count / total * 100);
      $('stat-trad').textContent = `${tPct}%`;
      $('stat-graph').textContent = `${gPct}%`;
      $('stat-combined').textContent = `${cPct}%`;
      $('bar-trad').style.width = `${tPct}%`;
      $('bar-graph').style.width = `${gPct}%`;
      $('bar-combined').style.width = `${cPct}%`;
    }
  } catch {
    // 静默失败
  }
}

// ═══════════════ Messages ═══════════════
function renderMarkdown(text) {
  // Simple markdown: **bold**, newlines, numbered lists
  let html = escapeHtml(text);
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Split into paragraphs on double newline
  const paras = html.split(/\n\n+/);
  html = paras.map(p => {
    const lines = p.split('\n');
    // Check if this is a numbered list
    if (lines.every((l, i) => /^\d+[\.\、\)]\s/.test(l.trimStart()))) {
      const items = lines.map(l => `<li>${l.replace(/^\d+[\.\、\)]\s*/, '')}</li>`).join('');
      return `<ol>${items}</ol>`;
    }
    // Check for bullet list
    if (lines.every(l => /^[-•]\s/.test(l.trimStart()))) {
      const items = lines.map(l => `<li>${l.replace(/^[-•]\s*/, '')}</li>`).join('');
      return `<ul>${items}</ul>`;
    }
    return `<p>${lines.join('<br>')}</p>`;
  }).join('');
  return html;
}

const STRATEGY_LABELS = {
  hybrid_traditional: { label: '混合检索', color: 'bg-brand-50 text-brand-600' },
  graph_rag: { label: '图RAG', color: 'bg-purple-50 text-purple-600' },
  combined: { label: '组合策略', color: 'bg-teal-50 text-teal-600' },
};

function addUserMessage(text) {
  const id = 'msg-' + Date.now();
  state.messages.push({ id, role: 'user', content: text, time: now() });
  const div = document.createElement('div');
  div.id = id;
  div.className = 'flex justify-end';
  div.innerHTML = `
    <div>
      <div class="user-message">
        ${escapeHtml(text)}
      </div>
      <div class="text-xs text-warm-800/40 mt-1 text-right">${now()}</div>
    </div>`;
  $('message-list').appendChild(div);
  scrollToBottom();
}

function addAiMessage(id, html) {
  const div = document.createElement('div');
  div.id = id;
  div.className = 'flex justify-start';
  div.innerHTML = html;
  $('message-list').appendChild(div);
  scrollToBottom();
}

function scrollToBottom() {
  const list = $('message-list');
  requestAnimationFrame(() => { list.scrollTop = list.scrollHeight; });
}

// ═══════════════ Typing indicator ═══════════════
function showTyping() {
  const id = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.id = id;
  div.className = 'flex justify-start';
  div.innerHTML = `
    <div>
      <div class="ai-message">
        <div class="flex items-center gap-1.5">
          <span class="typing-dot w-2 h-2 rounded-full bg-brand-400 inline-block"></span>
          <span class="typing-dot w-2 h-2 rounded-full bg-brand-400 inline-block"></span>
          <span class="typing-dot w-2 h-2 rounded-full bg-brand-400 inline-block"></span>
        </div>
      </div>
    </div>`;
  $('message-list').appendChild(div);
  scrollToBottom();
  return id;
}

function removeElement(id) {
  const el = $(id);
  if (el) el.remove();
}

// ═══════════════ Send message ═══════════════
async function sendMessage(question) {
  if (state.isStreaming) return;

  const input = $('chat-input');
  const q = question || input.value.trim();
  if (!q) return;

  if (!question) input.value = '';
  input.style.height = 'auto';

  // Hide welcome card when first message is sent
  const welcomeCard = $('welcome-card');
  if (welcomeCard) welcomeCard.style.display = 'none';

  addUserMessage(q);
  state.isStreaming = true;
  $('send-btn').disabled = true;

  const stream = $('stream-toggle').checked;
  if (stream) {
    await sendStreaming(q);
  } else {
    await sendNonStreaming(q);
  }

  state.isStreaming = false;
  $('send-btn').disabled = false;
  input.focus();
  fetchStats();
}

async function sendNonStreaming(question) {
  const typingId = showTyping();
  try {
    const res = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, stream: false }),
    });
    removeElement(typingId);

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const detail = err.detail || {};
      showToast(detail.message || '请求失败，请稍后重试', 'error');
      return;
    }

    const data = await res.json();
    const strategy = data.analysis?.recommended_strategy || 'hybrid_traditional';
    const s = STRATEGY_LABELS[strategy] || STRATEGY_LABELS.hybrid_traditional;

    addAiMessage('msg-' + Date.now(), `
      <div>
        <div class="ai-message">
          <div class="flex items-center gap-2 mb-2">
            <span class="text-xs px-2 py-0.5 rounded-full font-medium ${s.color}">${s.label}</span>
            <span class="text-xs text-warm-800/40">${data.response_time_ms?.toFixed(0) || '--'}ms</span>
          </div>
          <div class="msg-content text-sm sm:text-base text-warm-800 leading-relaxed">${renderMarkdown(data.answer)}</div>
        </div>
        <div class="text-xs text-warm-800/40 mt-1">${now()}</div>
      </div>`);
  } catch (e) {
    removeElement(typingId);
    showToast('网络错误，请检查服务是否运行', 'error');
  }
}

async function sendStreaming(question) {
  const msgId = 'msg-' + Date.now();
  addAiMessage(msgId, `
    <div>
      <div class="ai-message">
        <div class="flex items-center gap-2 mb-2" id="${msgId}-header">
          <span class="text-xs px-2 py-0.5 rounded-full font-medium bg-warm-100 text-warm-600">检索中…</span>
        </div>
        <div class="msg-content text-sm sm:text-base text-warm-800 leading-relaxed streaming-cursor" id="${msgId}-body"></div>
      </div>
      <div class="text-xs text-warm-800/40 mt-1">${now()}</div>
    </div>`);

  const bodyEl = $(`${msgId}-body`);
  const headerEl = $(`${msgId}-header`);
  let answerText = '';

  try {
    const res = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, stream: true }),
    });

    if (!res.ok) {
      bodyEl.textContent = '请求失败，请稍后重试';
      bodyEl.classList.remove('streaming-cursor');
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const event = JSON.parse(line.slice(6));
          switch (event.type) {
            case 'analysis': {
              const s = STRATEGY_LABELS[event.data.recommended_strategy] || STRATEGY_LABELS.hybrid_traditional;
              headerEl.innerHTML = `
                <span class="text-xs px-2 py-0.5 rounded-full font-medium ${s.color}">${s.label}</span>
                <span class="text-xs text-warm-800/40">复杂度 ${event.data.query_complexity?.toFixed(2)}</span>`;
              break;
            }
            case 'chunk':
              answerText += event.content;
              bodyEl.innerHTML = renderMarkdown(answerText);
              scrollToBottom();
              break;
            case 'done': {
              bodyEl.classList.remove('streaming-cursor');
              headerEl.innerHTML = (headerEl.innerHTML || '') + ` <span class="text-xs text-warm-800/40">${event.response_time_ms?.toFixed(0) || '--'}ms</span>`;
              break;
            }
            case 'error':
              bodyEl.innerHTML = renderMarkdown(answerText) + `<p class="text-red-500 mt-2">⚠ ${escapeHtml(event.message)}</p>`;
              bodyEl.classList.remove('streaming-cursor');
              break;
          }
        } catch {
          // 跳过无法解析的行
        }
      }
    }
    // 确保光标移除
    bodyEl.classList.remove('streaming-cursor');
  } catch (e) {
    if (answerText) {
      bodyEl.innerHTML = renderMarkdown(answerText) + '<p class="text-red-400 mt-2">[回答中断]</p>';
    } else {
      bodyEl.textContent = '网络连接中断，请重试';
    }
    bodyEl.classList.remove('streaming-cursor');
  }
}

// ═══════════════ Preset questions ═══════════════
function sendPreset(q) { $('chat-input').value = q; sendMessage(); }

// ═══════════════ Keyboard ═══════════════
function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ═══════════════ File Upload ═══════════════
async function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;

  const status = $('upload-status');
  const hint = $('upload-hint');
  status.classList.remove('hidden');
  status.textContent = '上传中…';
  status.className = 'mt-2 text-xs text-center text-warm-800/60';

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch(`${API}/api/upload`, {
      method: 'POST',
      body: formData,
    });
    const data = await res.json();
    if (res.ok && data.status === 'ok') {
      status.textContent = `"${file.name}" 上传成功`;
      status.className = 'mt-2 text-xs text-center text-emerald-500 font-medium';
      hint.textContent = '点击选择 .md / .pdf / .txt';
      showToast('食谱上传成功', 'success');
    } else {
      const msg = data.detail?.message || data.message || '上传失败';
      status.textContent = msg;
      status.className = 'mt-2 text-xs text-center text-red-500';
      showToast(msg, 'error');
    }
  } catch {
    status.textContent = '网络错误，上传失败';
    status.className = 'mt-2 text-xs text-center text-red-500';
  }

  // Reset file input
  event.target.value = '';
}

// ═══════════════ Rebuild ═══════════════
async function handleRebuild() {
  const btn = $('rebuild-btn');
  if (!state.rebuildConfirm) {
    state.rebuildConfirm = true;
    btn.textContent = '确认重建？再次点击执行';
    btn.classList.add('text-red-500');
    setTimeout(() => {
      if (state.rebuildConfirm) {
        state.rebuildConfirm = false;
        btn.textContent = '重建知识库';
        btn.classList.remove('text-red-500');
      }
    }, 5000);
    return;
  }

  state.rebuildConfirm = false;
  btn.textContent = '重建中…';
  btn.classList.remove('text-red-500');
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/api/rebuild`, { method: 'POST' });
    const data = await res.json();
    if (res.ok) {
      showToast('知识库重建成功', 'success');
    } else {
      showToast(data.detail?.message || '重建失败', 'error');
    }
  } catch {
    showToast('网络错误', 'error');
  }

  btn.textContent = '重建知识库';
  btn.disabled = false;
  fetchStats();
}
